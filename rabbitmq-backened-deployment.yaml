apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpromq01
  labels:
    app: vpromq01

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vpromq01

  template:
    metadata:
      labels:
        app: vpromq01

    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management

          ports:
            - name: rabbitmq
              containerPort: 5672

            - name: management
              containerPort: 15672

          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest

            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: rmq-pass
