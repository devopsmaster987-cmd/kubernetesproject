apiVersion: apps/v1
kind: Deployment
metadata:
  name: vproapp
  labels:
    app: vproapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vproapp

  template:
    metadata:
      labels:
        app: vproapp

    spec:
      initContainers:
        - name: initmy-db
          image: busybox:1.28
          command:
            - sh
            - -c
            - until nslookup vprodb; do echo waiting for mydb; sleep 2; done;

        - name: initmy-memcache
          image: busybox:1.28
          command:
            - sh
            - -c
            - until nslookup vprocache01; do echo waiting for memcache; sleep 2; done;
        - name: initmy-rabbitmq
          image: busybox:1.28
          command:
           - sh
           - -c
           - until nslookup vpromq01; do echo waiting for rabbitmq; sleep 2; done;
           
      containers:
        - name: vproapp
          image: abdulsamad988/vprofileapp:latest
          ports:
            - name: vproapp
              containerPort: 8080
